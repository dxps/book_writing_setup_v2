extends: default

page:
  size: A4
  margin: [0.75in, 0.75in, 0.85in, 0.75in]

base:
  font-family: Noto Serif
  font-size: 10.5
  line-height-length: 15
  line-height: $base-line-height-length / $base-font-size

heading:
  font-family: Noto Sans
  font-color: 1f2933
  h1-font-size: 26
  h2-font-size: 20
  h3-font-size: 15

link:
  font-color: 075985

code:
  font-family: M+ 1mn
  font-size: 9

literal:
  background-color: f5f7fa
  border-color: d8dee9
  border-radius: 4

footer:
  height: 0.65in
  line-height: 1
  recto:
    right:
      content: "{page-number}"
  verso:
    left:
      content: "{page-number}"

