name: Build book

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build all formats
        run: make all

      - name: Upload book artifacts
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: build/

